<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .category-card {
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all var(--transition);
      cursor: pointer;
    }
    .category-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .category-card-header { display: flex; align-items: center; gap: 12px; }
    .category-card-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .category-card-name { font-size: 1rem; font-weight: 700; }
    .category-card-desc { font-size: 0.8125rem; color: var(--color-text-muted); }
    .category-card-footer { display: flex; align-items: center; justify-content: space-between; }
    .category-task-count { font-size: 0.8125rem; color: var(--color-text-muted); }
    .color-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .color-preset {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all var(--transition);
    }
    .color-preset:hover, .color-preset.selected { border-color: var(--color-text); transform: scale(1.15); }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">✅</div>
      <span>TaskFlow</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Main</div>
      <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="tasks.html"><span class="nav-icon">✅</span> All Tasks</a>
      <a class="nav-item active" data-page="categories" href="categories.html"><span class="nav-icon">🏷️</span> Categories</a>
      <div class="nav-section-title" style="margin-top:8px">Quick Filters</div>
      <a class="nav-item" href="tasks.html?status=pending"><span class="nav-icon">⏳</span> Pending</a>
      <a class="nav-item" href="tasks.html?status=in-progress"><span class="nav-icon">🔄</span> In Progress</a>
      <a class="nav-item" href="tasks.html?status=completed"><span class="nav-icon">✔️</span> Completed</a>
      <a class="nav-item" href="tasks.html?overdue=true"><span class="nav-icon">🔥</span> Overdue</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="window.location.href='profile.html'">
        <div class="avatar" id="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
          <div class="sidebar-user-email" id="sidebar-user-email"></div>
        </div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main-content">
    <header class="topbar">
      <button class="hamburger btn btn-ghost" id="hamburger"><span></span><span></span><span></span></button>
      <div class="topbar-title">Categories</div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-icon" id="theme-toggle">🌙</button>
        <button class="btn btn-primary" id="new-cat-btn">+ New Category</button>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>
      </div>
    </header>

    <div class="page-content">
      <p class="text-muted mb-4">Organize your tasks with color-coded categories.</p>
      <div class="categories-grid" id="categories-grid">
        <div class="skeleton" style="height:120px;border-radius:12px"></div>
        <div class="skeleton" style="height:120px;border-radius:12px;opacity:.7"></div>
        <div class="skeleton" style="height:120px;border-radius:12px;opacity:.4"></div>
      </div>
    </div>
  </main>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="cat-modal-title">New Category</h3>
      <button class="btn btn-ghost btn-icon" id="close-cat-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Name <span class="required">*</span></label>
        <input type="text" id="cat-name" class="form-input" placeholder="e.g. Work" maxlength="30" />
        <div class="form-error" id="cat-name-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Icon</label>
        <input type="text" id="cat-icon" class="form-input" placeholder="Emoji icon e.g. 💼" maxlength="4" />
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <input type="color" id="cat-color" class="form-input" style="height:44px;padding:4px 8px;cursor:pointer" value="#6366f1" />
        <div class="color-presets" id="color-presets"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" id="cat-desc" class="form-input" placeholder="Optional description" maxlength="100" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-cat-modal">Cancel</button>
      <button class="btn btn-primary" id="save-cat-btn">Create Category</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/api.js"></script>
<script>
  requireAuth();
  Theme.init();
  initSidebar();
  initSidebarUser();
  initThemeToggle();
  setActiveNav('categories');

  const PRESET_COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16'];
  let editingCatId = null;

  // Render color presets
  const presetsEl = document.getElementById('color-presets');
  PRESET_COLORS.forEach(color => {
    const el = document.createElement('div');
    el.className = 'color-preset';
    el.style.background = color;
    el.title = color;
    el.addEventListener('click', () => {
      document.getElementById('cat-color').value = color;
      presetsEl.querySelectorAll('.color-preset').forEach(p => p.classList.remove('selected'));
      el.classList.add('selected');
    });
    presetsEl.appendChild(el);
  });

  async function loadCategories() {
    try {
      const res = await api.get('/categories');
      renderCategories(res.data);
    } catch {
      Toast.error('Failed to load categories');
    }
  }

  function renderCategories(cats) {
    const grid = document.getElementById('categories-grid');
    if (!cats.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🏷️</div>
          <h3>No categories yet</h3>
          <p>Create categories to organize your tasks</p>
          <button class="btn btn-primary" onclick="openCatModal()">+ New Category</button>
        </div>`;
      return;
    }

    grid.innerHTML = cats.map(cat => `
      <div class="category-card" onclick="openCatModal('${cat._id}')">
        <div class="category-card-header">
          <div class="category-card-icon" style="background:${cat.color}22">${cat.icon || '📁'}</div>
          <div>
            <div class="category-card-name">${escapeHtml(cat.name)}</div>
            ${cat.description ? `<div class="category-card-desc">${escapeHtml(cat.description)}</div>` : ''}
          </div>
          <div style="margin-left:auto;display:flex;gap:6px">
            <div class="color-swatch" style="background:${cat.color}"></div>
          </div>
        </div>
        <div class="category-card-footer">
          <a href="tasks.html?category=${cat._id}" class="category-task-count" onclick="event.stopPropagation()">
            📋 ${cat.taskCount || 0} task${cat.taskCount !== 1 ? 's' : ''}
          </a>
          <div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();openCatModal('${cat._id}')">✏️</button>
            <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();deleteCat('${cat._id}','${escapeHtml(cat.name)}')">🗑️</button>
          </div>
        </div>
      </div>`).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function openCatModal(catId = null) {
    editingCatId = catId;
    const title = document.getElementById('cat-modal-title');
    const saveBtn = document.getElementById('save-cat-btn');

    // Reset
    document.getElementById('cat-name').value = '';
    document.getElementById('cat-icon').value = '';
    document.getElementById('cat-color').value = '#6366f1';
    document.getElementById('cat-desc').value = '';
    document.getElementById('cat-name-error').classList.remove('visible');
    document.getElementById('cat-name').classList.remove('error');

    if (catId) {
      title.textContent = 'Edit Category';
      saveBtn.textContent = 'Save Changes';
      try {
        const res = await api.get('/categories');
        const cat = res.data.find(c => c._id === catId);
        if (cat) {
          document.getElementById('cat-name').value = cat.name;
          document.getElementById('cat-icon').value = cat.icon || '';
          document.getElementById('cat-color').value = cat.color || '#6366f1';
          document.getElementById('cat-desc').value = cat.description || '';
        }
      } catch {}
    } else {
      title.textContent = 'New Category';
      saveBtn.textContent = 'Create Category';
    }

    document.getElementById('cat-modal').classList.add('open');
    document.getElementById('cat-name').focus();
  }

  function closeCatModal() {
    document.getElementById('cat-modal').classList.remove('open');
    editingCatId = null;
  }

  async function saveCategory() {
    const name = document.getElementById('cat-name').value.trim();
    if (!name) {
      document.getElementById('cat-name').classList.add('error');
      const err = document.getElementById('cat-name-error');
      err.textContent = 'Category name is required';
      err.classList.add('visible');
      return;
    }

    const payload = {
      name,
      icon: document.getElementById('cat-icon').value.trim() || '📁',
      color: document.getElementById('cat-color').value,
      description: document.getElementById('cat-desc').value.trim()
    };

    const btn = document.getElementById('save-cat-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      if (editingCatId) {
        await api.put(`/categories/${editingCatId}`, payload);
        Toast.success('Category updated!');
      } else {
        await api.post('/categories', payload);
        Toast.success('Category created!');
      }
      closeCatModal();
      loadCategories();
    } catch (err) {
      Toast.error(err.message || 'Failed to save category');
    } finally {
      btn.disabled = false;
      btn.textContent = editingCatId ? 'Save Changes' : 'Create Category';
    }
  }

  async function deleteCat(id, name) {
    if (!confirm(`Delete category "${name}"? Tasks in this category will become uncategorized.`)) return;
    try {
      await api.delete(`/categories/${id}`);
      Toast.success('Category deleted');
      loadCategories();
    } catch {
      Toast.error('Failed to delete category');
    }
  }

  document.getElementById('new-cat-btn').addEventListener('click', () => openCatModal());
  document.getElementById('save-cat-btn').addEventListener('click', saveCategory);
  document.getElementById('close-cat-modal').addEventListener('click', closeCatModal);
  document.getElementById('cancel-cat-modal').addEventListener('click', closeCatModal);
  document.getElementById('cat-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeCatModal();
  });

  loadCategories();
</script>
</body>
</html>
