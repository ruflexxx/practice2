<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">✅</div>
      <h1>TaskFlow</h1>
    </div>
    <p class="auth-subtitle">Create your account to get started</p>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" class="form-input" placeholder="John Doe" autocomplete="name" />
        <div class="form-error" id="name-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
        <div class="form-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Phone Number <span style="color:var(--color-text-muted);font-weight:400">(optional)</span></label>
        <input type="tel" id="phone" class="form-input" placeholder="+1 234 567 8900" autocomplete="tel" />
        <div class="form-error" id="phone-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-input" placeholder="Min 6 chars, upper + lower + number" autocomplete="new-password" />
          <span class="password-toggle" id="pwd-toggle">👁</span>
        </div>
        <div class="form-error" id="password-error"></div>
        <div class="form-hint">At least 6 characters with uppercase, lowercase and a number</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password <span class="required">*</span></label>
        <div class="password-wrapper">
          <input type="password" id="confirm-password" class="form-input" placeholder="Repeat your password" autocomplete="new-password" />
          <span class="password-toggle" id="cpwd-toggle">👁</span>
        </div>
        <div class="form-error" id="confirm-password-error"></div>
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg" id="register-btn">
        Create Account
      </button>
    </form>

    <div class="auth-divider"><span>Already have an account?</span></div>
    <a href="login.html" class="btn btn-secondary w-full" style="justify-content:center">Sign In</a>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/api.js"></script>
<script>
  redirectIfLoggedIn();
  Theme.init();

  // Password toggles
  function setupToggle(toggleId, inputId) {
    document.getElementById(toggleId).addEventListener('click', function () {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
      this.textContent = input.type === 'password' ? '👁' : '🙈';
    });
  }
  setupToggle('pwd-toggle', 'password');
  setupToggle('cpwd-toggle', 'confirm-password');

  function showError(id, msg) {
    const el = document.getElementById(id + '-error');
    document.getElementById(id).classList.add('error');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearErrors() {
    ['name', 'email', 'phone', 'password', 'confirm-password'].forEach(id => {
      const input = document.getElementById(id);
      const err = document.getElementById(id + '-error');
      if (input) input.classList.remove('error');
      if (err) { err.textContent = ''; err.classList.remove('visible'); }
    });
  }

  function validateForm() {
    clearErrors();
    let valid = true;

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (!name || name.length < 2) {
      showError('name', 'Name must be at least 2 characters');
      valid = false;
    }

    if (!email) {
      showError('email', 'Email is required');
      valid = false;
    } else if (!/^\S+@\S+\.\S+$/.test(email)) {
      showError('email', 'Please enter a valid email address');
      valid = false;
    }

    if (phone && !/^\+?[\d\s\-()]{7,15}$/.test(phone)) {
      showError('phone', 'Please enter a valid phone number (e.g. +1 234 567 8900)');
      valid = false;
    }

    if (!password) {
      showError('password', 'Password is required');
      valid = false;
    } else if (password.length < 6) {
      showError('password', 'Password must be at least 6 characters');
      valid = false;
    } else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
      showError('password', 'Password must contain uppercase, lowercase and a number');
      valid = false;
    }

    if (!confirm) {
      showError('confirm-password', 'Please confirm your password');
      valid = false;
    } else if (password !== confirm) {
      showError('confirm-password', 'Passwords do not match');
      valid = false;
    }

    return valid;
  }

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validateForm()) return;

    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';

    try {
      const phone = document.getElementById('phone').value.trim();
      const data = await api.post('/auth/register', {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        ...(phone && { phone })
      });

      Auth.setToken(data.token);
      Auth.setUser(data.user);
      Toast.success('Account created! Welcome to TaskFlow 🎉');
      setTimeout(() => window.location.href = 'index.html', 600);
    } catch (err) {
      if (err.errors?.length) {
        err.errors.forEach(e => showError(e.field, e.message));
      }
      Toast.error(err.message || 'Registration failed');
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  });
</script>
</body>
</html>
