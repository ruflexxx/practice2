<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">✅</div>
      <span>TaskFlow</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Main</div>
      <a class="nav-item active" data-page="dashboard" href="index.html">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a class="nav-item" data-page="tasks" href="tasks.html">
        <span class="nav-icon">✅</span> All Tasks
        <span class="nav-badge" id="nav-total">0</span>
      </a>
      <a class="nav-item" data-page="categories" href="categories.html">
        <span class="nav-icon">🏷️</span> Categories
      </a>

      <div class="nav-section-title" style="margin-top:8px">Quick Filters</div>
      <a class="nav-item" href="tasks.html?status=pending">
        <span class="nav-icon">⏳</span> Pending
        <span class="nav-badge" id="nav-pending">0</span>
      </a>
      <a class="nav-item" href="tasks.html?status=in-progress">
        <span class="nav-icon">🔄</span> In Progress
        <span class="nav-badge" id="nav-inprogress">0</span>
      </a>
      <a class="nav-item" href="tasks.html?status=completed">
        <span class="nav-icon">✔️</span> Completed
      </a>
      <a class="nav-item" href="tasks.html?overdue=true">
        <span class="nav-icon">🔥</span> Overdue
        <span class="nav-badge" id="nav-overdue" style="background:rgba(239,68,68,0.3)">0</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="window.location.href='profile.html'">
        <div class="avatar" id="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
          <div class="sidebar-user-email" id="sidebar-user-email"></div>
        </div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main -->
  <main class="main-content">
    <header class="topbar">
      <button class="hamburger btn btn-ghost" id="hamburger">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-icon" id="theme-toggle" title="Toggle theme">🌙</button>
        <button class="btn btn-primary" id="new-task-btn">+ New Task</button>
        <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>
      </div>
    </header>

    <div class="page-content">
      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(99,102,241,0.12)">📋</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(245,158,11,0.12)">⏳</div>
          <div class="stat-value" id="stat-pending">—</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(59,130,246,0.12)">🔄</div>
          <div class="stat-value" id="stat-inprogress">—</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(16,185,129,0.12)">✅</div>
          <div class="stat-value" id="stat-completed">—</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(239,68,68,0.12)">🔥</div>
          <div class="stat-value text-danger" id="stat-overdue">—</div>
          <div class="stat-label">Overdue</div>
        </div>
      </div>

      <!-- Recent tasks -->
      <div class="flex items-center justify-between mb-4">
        <h2>Recent Tasks</h2>
        <a href="tasks.html" class="btn btn-secondary btn-sm">View All →</a>
      </div>

      <div id="task-list" class="task-list">
        <!-- Loaded by JS -->
        <div class="skeleton" style="height:72px;border-radius:10px"></div>
        <div class="skeleton" style="height:72px;border-radius:10px;opacity:.7"></div>
        <div class="skeleton" style="height:72px;border-radius:10px;opacity:.4"></div>
      </div>
    </div>
  </main>
</div>

<!-- New Task Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">New Task</h3>
      <button class="btn btn-ghost btn-icon" id="close-modal">✕</button>
    </div>
    <div class="modal-body">
      <form id="task-form" novalidate>
        <div class="form-group">
          <label class="form-label">Title <span class="required">*</span></label>
          <input type="text" id="task-title" class="form-input" placeholder="What needs to be done?" maxlength="100" />
          <div class="form-error" id="title-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="task-desc" class="form-textarea" placeholder="Add details..." maxlength="1000"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="task-status" class="form-select">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select id="task-priority" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" id="task-due" class="form-input" />
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="task-category" class="form-select">
              <option value="">No category</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Tags</label>
          <div class="tags-input-wrapper" id="tags-wrapper">
            <input type="text" id="tags-input" placeholder="Type and press Enter..." />
          </div>
          <div class="form-hint">Press Enter or comma to add a tag</div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-modal">Cancel</button>
      <button class="btn btn-primary" id="save-task-btn">Create Task</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/tasks.js"></script>
<script>
  requireAuth();
  Theme.init();
  initSidebar();
  initSidebarUser();
  initThemeToggle();
  setActiveNav('dashboard');

  // Load dashboard
  loadDashboard();

  async function loadDashboard() {
    try {
      const [profileRes, tasksRes] = await Promise.all([
        api.get('/users/profile'),
        api.get('/tasks?limit=8&sort=-createdAt')
      ]);

      const s = profileRes.stats;
      document.getElementById('stat-total').textContent = s.totalTasks;
      document.getElementById('stat-pending').textContent = s.pendingTasks;
      document.getElementById('stat-inprogress').textContent = s.inProgressTasks;
      document.getElementById('stat-completed').textContent = s.completedTasks;
      document.getElementById('stat-overdue').textContent = s.overdueTasks;

      // Sidebar badges
      document.getElementById('nav-total').textContent = s.totalTasks;
      document.getElementById('nav-pending').textContent = s.pendingTasks;
      document.getElementById('nav-inprogress').textContent = s.inProgressTasks;
      document.getElementById('nav-overdue').textContent = s.overdueTasks;

      renderTaskList(tasksRes.data, 'task-list');
    } catch (err) {
      Toast.error('Failed to load dashboard');
    }
  }

  // Open new task modal
  document.getElementById('new-task-btn').addEventListener('click', () => openTaskModal());
  document.getElementById('close-modal').addEventListener('click', closeModal);
  document.getElementById('cancel-modal').addEventListener('click', closeModal);
  document.getElementById('task-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
</script>
</body>
</html>
